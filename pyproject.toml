[project]
name = "scraper-agent"
version = "0.1.0"
description = "AI agent that scrapes job postings and interview questions into structured data"
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.128.0",
    "uvicorn==0.40.0",
    "sqlalchemy==2.0.44",
    "pydantic==2.12.4",
    "scrapling[fetchers]==0.3.10",
    "ollama==0.6.1",
    "anthropic==0.75.0",
    "python-dotenv==1.2.1",
    "httpx==0.28.1",
    "huey==3.1.1",
    "sqlite-vec==0.1.9",
    "alembic==1.18.5",
    "pymupdf4llm==1.28.0",
    "python-multipart==0.0.32",
]

[project.optional-dependencies]
dev = [
    "pytest==8.4.2",
    "mypy==1.19.0",
    "ruff==0.14.5",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["backend"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic-generated revision files (PHASE7.md step 1) — regenerated by
# `alembic revision --autogenerate` in Alembic's own template style every
# time, not hand-written; migrations/env.py is hand-authored and stays
# linted normally, same "vendored vs. hand-written" split as
# frontend/CLAUDE.md's shadcn/ui exemption.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["backend"]

[[tool.mypy.overrides]]
module = ["huey", "huey.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["pymupdf4llm"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["sqlite_vec"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
